{% extends "base.html" %}

{% block title %}Login - EstateAI{% endblock %}

{% block content %}
<div class="auth-container glass-card">
    <div class="auth-header">
        <h1>Welcome Back</h1>
        <p>Access your real estate analytics dashboard</p>
    </div>

    <form action="/login" method="POST">
        <div class="form-group">
            <label for="email" class="form-label">Email Address</label>
            <div class="input-group">
                <span class="input-icon"><i class="fa-solid fa-envelope"></i></span>
                <input type="email" id="email" name="email" class="form-control form-control-icon" placeholder="name@example.com" required autocomplete="email">
            </div>
        </div>

        <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <div class="input-group">
                <span class="input-icon"><i class="fa-solid fa-lock"></i></span>
                <input type="password" id="password" name="password" class="form-control form-control-icon" placeholder="Enter your password" required autocomplete="current-password">
            </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block">
            <i class="fa-solid fa-right-to-bracket"></i> Sign In
        </button>
    </form>

    <div class="auth-footer">
        <p>Don't have an account? <a href="/register">Sign Up</a></p>
    </div>
</div>
{% endblock %}
